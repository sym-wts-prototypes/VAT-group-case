name: Figma Sync Check

# Detects design-system drift (DS components not yet in @wts/ui) and previews
# token changes. Runs weekly and on demand. Reports only — never fails the build —
# so it surfaces drift without blocking. Needs the FIGMA_ACCESS_TOKEN repo secret.
on:
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC
  workflow_dispatch:

jobs:
  sync-check:
    runs-on: ubuntu-latest
    env:
      HAS_FIGMA: ${{ secrets.FIGMA_ACCESS_TOKEN != '' }}
      FIGMA_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Component drift
        if: env.HAS_FIGMA == 'true'
        run: pnpm drift:check

      - name: Token drift (dry-run)
        if: env.HAS_FIGMA == 'true'
        run: pnpm tokens:pull || true
