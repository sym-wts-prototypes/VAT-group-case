<div id="app">
  <h2>WTS Prototype Bridge</h2>
  <p>In the gallery click <b>Copy to Figma</b>, then hit <b>Paste &amp; Import</b> below. (Or paste the JSON / choose the downloaded file.)</p>
  <button id="paste" class="primary">Paste &amp; Import from clipboard</button>
  <textarea id="json" placeholder="…or paste the export JSON here (auto-imports)"></textarea>
  <input type="file" id="file" accept="application/json,.json" />
  <div class="row">
    <button id="import">Import</button>
    <button id="close">Close</button>
  </div>
  <p id="status"></p>
</div>

<style>
  body { margin: 0; font-family: Inter, system-ui, sans-serif; color: #18181b; }
  #app { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  h2 { font-size: 14px; margin: 0; }
  p { font-size: 11px; color: #71717a; margin: 0; line-height: 1.45; }
  textarea { width: 100%; box-sizing: border-box; height: 170px; font-family: ui-monospace, monospace; font-size: 11px; border: 1px solid #e4e4e7; border-radius: 8px; padding: 8px; resize: vertical; }
  .row { display: flex; gap: 8px; }
  button { flex: 1; height: 34px; border: 1px solid #e4e4e7; border-radius: 8px; background: #fff; font-size: 13px; cursor: pointer; }
  button.primary { background: #18181b; color: #fff; border-color: #18181b; }
  #status { color: #c9202f; }
</style>

<script>
  const $ = (id) => document.getElementById(id)
  const status = $('status')

  function importText(text) {
    status.textContent = ''
    let payload
    try {
      payload = JSON.parse(text)
    } catch (err) {
      status.textContent = 'Invalid JSON: ' + err.message
      return
    }
    if (!payload || !Array.isArray(payload.scenes)) {
      status.textContent = 'That doesn’t look like a Bridge export (missing "scenes").'
      return
    }
    parent.postMessage({ pluginMessage: { type: 'import', payload } }, '*')
  }

  // Primary path: read straight from the clipboard (set by the gallery's "Copy to Figma").
  $('paste').addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText()
      if (!text) { status.textContent = 'Clipboard is empty — click "Copy to Figma" in the gallery first.'; return }
      $('json').value = text
      importText(text)
    } catch (err) {
      status.textContent = 'Clipboard blocked — paste (Cmd/Ctrl+V) into the box below instead.'
      $('json').focus()
    }
  })

  // Pasting into the textarea auto-imports.
  $('json').addEventListener('paste', (e) => {
    const text = (e.clipboardData || window.clipboardData).getData('text')
    if (text) { e.preventDefault(); $('json').value = text; importText(text) }
  })

  $('file').addEventListener('change', (e) => {
    const file = e.target.files[0]
    if (!file) return
    const reader = new FileReader()
    reader.onload = () => { $('json').value = reader.result; importText(reader.result) }
    reader.readAsText(file)
  })

  $('import').addEventListener('click', () => importText($('json').value))

  $('close').addEventListener('click', () => {
    parent.postMessage({ pluginMessage: { type: 'close' } }, '*')
  })
</script>
